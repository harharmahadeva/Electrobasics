<!DOCTYPE html>
<html lang="en" class="h-full bg-[#070b13] text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroBasics - Portal Login</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#070b13">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tech-font { font-family: 'Orbitron', sans-serif; }
        
        /* Cyberpunk glow effect */
        .glow-box {
            box-shadow: 0 0 25px -5px rgba(245, 158, 11, 0.15), 0 0 15px -5px rgba(6, 182, 212, 0.15);
        }
    </style>
</head>
<body class="h-full flex items-center justify-center p-4 relative overflow-hidden">

    <!-- Background Tech Aesthetics (Matches the circuit vibes from the layout mockups) -->
    <div class="absolute inset-0 z-0 pointer-events-none opacity-20">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-amber-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-cyan-500/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- MAIN LOGIN CARD -->
    <div class="w-full max-w-md bg-[#0d1527]/80 backdrop-blur-xl border border-[#1e293b] rounded-2xl p-6 lg:p-8 z-10 glow-box transition-all duration-300">
        
        <!-- Header / Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-amber-500/10 border border-amber-500/30 text-2xl mb-3 animate-pulse">
                ⚡
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-white tech-font">ELECTROBASICS</h1>
            <p class="text-xs text-gray-400 mt-1.5 uppercase tracking-widest">Initialize Lab Terminal</p>
        </div>

        <!-- Notification Banner (For mock errors/success) -->
        <div id="banner" class="hidden mb-4 p-3 rounded-xl border text-xs text-center transition-all"></div>

        <!-- Form Layout -->
        <form id="loginForm" class="space-y-5">
            
            <!-- Email Input -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Access Key / Email</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-gray-500 text-sm">👤</span>
                    <input 
                        type="email" 
                        id="email"
                        required
                        placeholder="sandeep@electronics.lab" 
                        value="sandeep@electronics.lab"
                        class="w-full bg-[#070b13] border border-[#1e293b] rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-amber-500 transition-colors placeholder-gray-600"
                    >
                </div>
            </div>

            <!-- Password Input -->
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Security Passphrase</label>
                <div class="relative">
                    <span class="absolute left-3.5 top-3 text-gray-500 text-sm">🔒</span>
                    <input 
                        type="password" 
                        id="password"
                        required
                        placeholder="••••••••" 
                        value="password123"
                        class="w-full bg-[#070b13] border border-[#1e293b] rounded-xl pl-10 pr-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-cyan-500 transition-colors placeholder-gray-600"
                    >
                </div>
                <div class="flex justify-end mt-2">
                    <a href="#" class="text-[11px] text-cyan-400 hover:underline">Recover Access Key?</a>
                </div>
            </div>

            <!-- Keep Logged In Option -->
            <div class="flex items-center gap-2 pt-1">
                <input 
                    type="checkbox" 
                    id="remember" 
                    checked
                    class="accent-amber-500 rounded bg-[#070b13] border-[#1e293b]"
                >
                <label for="remember" class="text-xs text-gray-400 cursor-pointer select-none">Remember terminal credentials</label>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit"
                class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-black font-bold text-sm py-3 px-4 rounded-xl shadow-lg transition-all transform active:scale-[0.99] flex items-center justify-center gap-2 mt-2 tech-font"
            >
                <span id="btnText">Connect Terminal</span>
                <span id="btnSpinner" class="hidden animate-spin rounded-full h-4 w-4 border-2 border-black border-t-transparent"></span>
            </button>
        </form>

        <!-- Alternative actions footer -->
        <div class="text-center mt-6 pt-5 border-t border-[#1e293b]/60">
            <p class="text-xs text-gray-500">
                New cadet? <a href="#" class="text-amber-500 font-medium hover:underline ml-1">Create Account ➔</a>
            </p>
        </div>
    </div>

    <!-- Script logic for transition & simulation -->
    <script>
        const form = document.getElementById('loginForm');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const banner = document.getElementById('banner');

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            // UI Feedback state change
            btnText.textContent = "Authorizing...";
            btnSpinner.classList.remove('hidden');
            form.querySelectorAll('input, button').forEach(el => el.disabled = true);

            // Display success status simulation
            setTimeout(() => {
                banner.className = "mb-4 p-3 rounded-xl border text-xs text-center bg-emerald-950/40 border-emerald-500/30 text-emerald-400 block";
                banner.textContent = "✓ Security credentials clear. Access granted.";
                btnText.textContent = "Booting Engine...";
                
                // Redirect user straight into your dashboard setup
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);

            }, 1200);
        });

        // PWA Register Hook
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
